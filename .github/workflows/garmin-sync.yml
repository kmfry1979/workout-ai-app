name: Garmin Sync

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: "User ID"
        required: true
      reason:
        description: "Trigger reason"
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug input
        run: |
          echo "User ID: ${{ github.event.inputs.user_id }}"
          echo "Reason: ${{ github.event.inputs.reason }}"

      # 👉 You will replace this later with your Python sync
      - name: Fake sync step
        run: echo "Garmin sync triggered"
