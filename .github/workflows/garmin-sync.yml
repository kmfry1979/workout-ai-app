name: Garmin Sync

on:
  # Token-based login only (password fallback is disabled in CI via the CI env
  # var), so this doesn't burn password attempts against Garmin's rate limiter.
  # Cadence: every 4 hours. Adjust if you want fresher data.
  schedule:
    - cron: "0 */4 * * *"

  # Allow manual trigger from GitHub UI or via API dispatch from the website
  workflow_dispatch:
    inputs:
      user_id:
        description: "Supabase user UUID to sync (leave blank to use secret default)"
        required: false
        default: ""
      reason:
        description: "Reason for manual sync"
        required: false
        default: "manual"
      days_back:
        description: "Number of days to sync (1 = today only)"
        required: false
        default: "1"
      run_id:
        description: "Optional sync run id (UI tails progress rows with this id)"
        required: false
        default: ""
      request_delay:
        description: "Seconds to sleep between Garmin API calls (rate-limit safety)"
        required: false
        default: "1.0"

jobs:
  sync:
    name: Sync Garmin → Supabase
    runs-on: ubuntu-latest
    # Long enough for a 1-year backfill (~10s per day × 365 ≈ 60 min, plus head-room).
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: garmin-sync/requirements.txt

      - name: Install dependencies
        run: pip install -r garmin-sync/requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ inputs.user_id || secrets.SUPABASE_USER_ID }}
          GARMIN_ACTIVITY_LIMIT: "20"
          GARMIN_DAYS_BACK: ${{ inputs.days_back || '1' }}
          GARMIN_REQUEST_DELAY: ${{ inputs.request_delay || '1.0' }}
          GARMIN_SYNC_RUN_ID: ${{ inputs.run_id || '' }}
          GARMINTOKENS: /tmp/garmin_tokens
        run: python garmin-sync/sync_once.py
